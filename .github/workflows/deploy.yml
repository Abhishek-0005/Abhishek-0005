name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [develop]
  push:
    branches: [lib-core]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lms
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: lms
        run: npm ci
      - name: Generate Prisma Client
        working-directory: lms
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lms
        run: npx prisma generate
      - name: Run migrations
        working-directory: lms
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lms
        run: npx prisma migrate deploy
      - name: Seed DB
        working-directory: lms
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lms
        run: npm run seed
      - name: Typecheck
        working-directory: lms
        run: npm run typecheck
      - name: Lint
        working-directory: lms
        run: npm run lint -- --no-error-on-unmatched-pattern
      - name: Test
        working-directory: lms
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lms
        run: npm test
      - name: Build
        working-directory: lms
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lms
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: testsecret
        run: npm run build
      - name: Deploy
        if: ${{ success() }}
        run: echo "Deployment step placeholder"
